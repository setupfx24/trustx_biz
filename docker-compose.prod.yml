# ============================================================
# trustx — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================
name: trustx

services:
  # ── Infrastructure — restart policy only (no host ports needed) ──
  postgres:
    restart: always

  timescaledb:
    restart: always

  redis:
    restart: always

  # zookeeper / kafka / kafka-ui removed (see docker-compose.yml note).

  # ── Backend services — restart policy + localhost-only ports ──
  admin-api:
    ports:
      - "127.0.0.1:8003:8001"
    restart: always
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--workers",
        "2",
      ]

  gateway:
    ports:
      - "127.0.0.1:8002:8000"
    restart: always
    environment:
      CORS_ORIGINS: https://trustx.biz,https://trade.trustx.biz,https://admin.trustx.biz
      COOKIE_DOMAIN: .trustx.biz
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Mobile app stores its own tokens (no cookies), so it needs the
      # refresh token returned in the login JSON body. The web app keeps
      # using the httpOnly cookie regardless. Without this the mobile app
      # errors "gateway did not return a refresh token".
      JWT_INCLUDE_REFRESH_IN_JSON: "true"
    command:
      [
        "uvicorn",
        "services.gateway.src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]

  market-data:
    restart: always

  b-book-engine:
    restart: always

  risk-engine:
    restart: always

  # ── Frontends — build with production domain + restart ──────
  trader-frontend:
    build:
      context: ./frontend/trader
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-production}
        NEXT_PUBLIC_WS_URL: wss://api.trustx.biz
        NEXT_PUBLIC_MARKETING_HOST: trustx.biz
        NEXT_PUBLIC_TRADE_HOST: trade.trustx.biz
        # Baked into the bundle at build time so the Google Sign-In button can render.
        # Same value as backend GOOGLE_CLIENT_ID. Leave blank to hide the button.
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        # WalletConnect (Reown Cloud) project id for RainbowKit. Without it,
        # only browser-injected wallets (MetaMask, OKX) work; the WalletConnect
        # mobile-deeplink path (Trust Wallet etc.) is disabled.
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
        # Cloudflare Turnstile site key (PUBLIC). Baked into the bundle at
        # build time so the widget can render on /auth/register. The matching
        # SECRET goes to the gateway env (CLOUDFLARE_TURNSTILE_SECRET_KEY)
        # — never expose it to the browser.
        NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY:-}
        # Support quick-contact channels rendered on /support above the
        # ticket list. Either may be empty — the button hides if so.
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@trustx.biz}
        NEXT_PUBLIC_SUPPORT_WHATSAPP: ${NEXT_PUBLIC_SUPPORT_WHATSAPP:-}
    ports:
      - "127.0.0.1:3012:3000"
    environment:
      INTERNAL_API_URL: http://gateway:8000/api/v1
      TRADER_API_PROXY_TARGET: http://gateway:8000
      # Browser WebSocket connects directly to api subdomain
      NEXT_PUBLIC_WS_URL: wss://api.trustx.biz
      # Host pair for the marketing/app domain split (read by src/middleware.ts)
      NEXT_PUBLIC_MARKETING_HOST: trustx.biz
      NEXT_PUBLIC_TRADE_HOST: trade.trustx.biz
      # DO NOT set NEXT_PUBLIC_GATEWAY_URL — browser uses same-origin /api/v1 proxy (avoids CORS)
    restart: always

  admin-frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3013:3001"
    environment:
      ADMIN_API_PROXY_TARGET: http://admin-api:8001
    restart: always
