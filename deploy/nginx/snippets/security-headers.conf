# Shared security headers for all trustx server blocks.
# Include with:  include /etc/nginx/snippets/security-headers.conf;
# (or relative path under /etc/nginx).
#
# `always` is required so headers are emitted on error responses too.

# HSTS — 1 year, include subdomains, preload-eligible. Only safe behind
# Cloudflare-Origin TLS that already terminates HTTPS for the user.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer leakage
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable powerful browser features we don't use (geolocation, mic, camera, etc.)
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# Cross-origin isolation (safe defaults — relax per-route if a 3rd party embed breaks)
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# Content Security Policy.
# Notes:
#   * 'unsafe-inline' on script-src is required for Next.js inline runtime
#     bootstrap. Replace with hashes/nonces if you can wire them up.
#   * connect-src includes wss for the trader's price + trade WebSockets.
#   * frame-src includes blob: — the TradingView charting_library injects
#     its chart canvas inside an iframe whose src is a runtime-generated
#     blob: URL via URL.createObjectURL(). Without this the chart panel
#     renders blank with a "Framing 'blob:...' violates CSP" console error.
#   * worker-src 'self' blob: — TradingView also spawns Web Workers from
#     blob URLs (data scaling, indicator math). 'self' alone is too tight.
#   * frame-src https://accounts.google.com — Google sign-in iframe.
#   * frame-src https://*.tradingview.com — TradingView's hosted iframe
#     embed (used as fallback when the standalone library can't load).
#   * frame-src https://*.tradingview-widget.com — TradingView's news /
#     ticker / mini-chart embeds load from this SEPARATE domain, NOT a
#     subdomain of tradingview.com. Without this whitelist the live-news
#     panel inside the trading terminal renders as a broken-image icon
#     (CSP blocks the iframe before it can fetch its bundle). Same domain
#     also needs script-src for the embedded widget runtime.
#   * script-src includes static.cloudflareinsights.com so Cloudflare's
#     auto-injected analytics beacon stops emitting CSP-violation noise
#     in the console. (Disable Browser Insights in CF dash to remove
#     the beacon entirely.)
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://accounts.google.com https://*.tradingview.com https://s3.tradingview.com https://*.tradingview-widget.com https://static.cloudflareinsights.com https://challenges.cloudflare.com https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.gstatic.com; worker-src 'self' blob:; child-src 'self' blob: https://accounts.google.com https://*.tradingview.com https://*.tradingview-widget.com https://challenges.cloudflare.com https://translate.google.com; connect-src 'self' https: wss: blob:; frame-src 'self' blob: https://accounts.google.com https://*.tradingview.com https://*.tradingview-widget.com https://www.google.com https://challenges.cloudflare.com https://verify.walletconnect.org https://verify.walletconnect.com https://translate.google.com; frame-ancestors 'self'; form-action 'self'; upgrade-insecure-requests" always;
