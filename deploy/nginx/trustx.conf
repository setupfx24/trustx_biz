# ============================================================
# Nginx config for trustx — trustx.biz
# Cloudflare Origin SSL + reverse proxy to Docker containers
# ============================================================

# ── Rate limiting zones ──────────────────────────────────────
# Bumped 2026-05-15: the trader dashboard fires 6-8 endpoints per render
# and the terminal polls positions/prices alongside chart subscribes —
# the old 30/20 r/s limits 503'd legitimate single-user traffic on cold
# loads. New ceilings still leave plenty of headroom under abuse.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=60r/s;

# ── Upstream definitions ─────────────────────────────────────
upstream trader_frontend {
    server 127.0.0.1:3012;
}

upstream admin_frontend {
    server 127.0.0.1:3013;
}

upstream gateway_api {
    server 127.0.0.1:8002;
}

# ── Redirect www → apex ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.trustx.biz;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    return 301 https://trustx.biz$request_uri;
}

# ── HTTP → HTTPS redirect (Cloudflare handles this, but just in case) ──
server {
    listen 80;
    listen [::]:80;
    server_name trustx.biz www.trustx.biz admin.trustx.biz api.trustx.biz trade.trustx.biz;
    return 301 https://$host$request_uri;
}

# ==============================================================
# 1) TRADER FRONTEND — trustx.biz
# ==============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trustx.biz;

    # ── Cloudflare Origin SSL ─────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers (HSTS, CSP, framing, MIME, referrer, perms) ──
    include /etc/nginx/snippets/security-headers.conf;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Client body size (for KYC uploads) ────────────────────
    client_max_body_size 15M;

    # Rate-limit applied only inside the dynamic `location /` block —
    # see the trade.trustx.biz block below for the rationale.

    # ── Real IP from Cloudflare ───────────────────────────────
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Proxy to Next.js trader frontend ──────────────────────
    location / {
        limit_req zone=web_limit burst=40 nodelay;
        proxy_pass http://trader_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ── Next.js static assets — long cache, unlimited ─────────
    location /_next/static/ {
        proxy_pass http://trader_frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# ==============================================================
# 1b) TRADER FRONTEND (user-app subdomain) — trade.trustx.biz
#    Same upstream as the apex; Next.js middleware enforces the
#    marketing/app split based on the Host header.
# ==============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trade.trustx.biz;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/snippets/security-headers.conf;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 15M;

    # Rate-limit applied ONLY inside the dynamic `location /` block below.
    # Putting it at server-level makes it inherit into the static-asset
    # location blocks (charting_library, _next/static) and trip 503 on
    # chart-page bursts. The `limit_req off;` syntax to override an
    # inherited limit isn't available on this nginx version, so we just
    # don't put the limit at server scope in the first place.

    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    location / {
        limit_req zone=web_limit burst=40 nodelay;
        proxy_pass http://trader_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Next.js compiled JS/CSS bundles — long-cached static, never abuse-prone.
    # No limit_req here so a chart-page burst can't trip rate-limiting.
    location /_next/static/ {
        proxy_pass http://trader_frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # TradingView Advanced Charting Library — fires 50+ small JS chunk
    # requests in parallel on chart mount. No rate-limit on this path
    # so chart bundles always load.
    location /charting_library/ {
        proxy_pass http://trader_frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

